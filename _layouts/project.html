---
layout: default
---
<main class="container">
  <article class="project">
    <header class="project-header">
      <h1>{{ page.title }}</h1>
      <p class="project-meta">
        <time datetime="{{ page.date }}">{{ page.date | date: "%b %-d, %Y" }}</time>
        {% if page.tags %} • {% for t in page.tags %}<span class="tag">{{ t }}</span>{% endfor %}{% endif %}
      </p>
      {% if page.image %}
        <img class="project-cover" src="{{ page.image | relative_url }}" alt="{{ page.title }}">
      {% endif %}
    </header>

    <div class="project-body">
      {{ content }}
    </div>
  </article>
</main>
