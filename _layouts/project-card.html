<a class="project-card" href="{{ project.url | relative_url }}">
  {% if project.image %}
    <img class="project-card-image" src="{{ project.image | relative_url }}" alt="{{ project.title }}">
  {% endif %}
  <div class="project-card-body">
    <h3 class="project-card-title">{{ project.title }}</h3>
    <p class="project-card-excerpt">{{ project.excerpt | strip_html | truncate: 140 }}</p>
  </div>
</a>
